name: Convert Domain List to JSON

on:
  push:
    paths:
      - 'files/domain-list.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Convert TXT to JSON
        run: |
          python3 scripts/convert_domains.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add files/domain-list.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Convert domain-list.txt to JSON"
          git push
