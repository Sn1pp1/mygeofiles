name: Build community.lst

on:
  push:
    paths:
      - 'files/community.lst'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download & sync community.lst
        id: sync
        run: |
          SOURCE_URL="https://community.antifilter.download/list/community.lst"
          TARGET_FILE="files/community.lst"
          TEMP_FILE="files/community.lst.tmp"
          
          echo "📥 Скачиваю: $SOURCE_URL"
          curl -fsSL "$SOURCE_URL" -o "$TEMP_FILE" || {
            echo "❌ Ошибка загрузки"
            exit 1
          }
          
          # Простое сравнение: если файл не изменился — выходим
          if [ -f "$TARGET_FILE" ] && diff -q "$TARGET_FILE" "$TEMP_FILE" >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Файл не изменился"
            rm -f "$TEMP_FILE"
            exit 0
          fi
          
          mv "$TEMP_FILE" "$TARGET_FILE"
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ community.lst обновлён: $(wc -l < "$TARGET_FILE") строк"

      - name: Commit and push result
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "RU Blocklist Bot"
          git config user.email "blocklist-bot@github.com"
          
          git pull --rebase origin main 2>/dev/null || true
          
          git add files/community.lst
          
          if ! git diff --staged --quiet; then
            # [skip ci] предотвращает бесконечный цикл запусков
            git commit -m "🔄 Update community.lst ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
            
            for i in 1 2 3; do
              git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
            done
            echo "📤 Файл успешно обновлён"
          else
            echo "⏭️ Нет изменений для коммита"
          fi
