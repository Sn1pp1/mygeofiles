name: Build community.lst

on:
  push:
    paths:
      - 'files/community.lst'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download latest sing-box binary
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo "Latest version: $LATEST_TAG"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          sudo mv "sing-box-${LATEST_TAG#v}-linux-amd64/sing-box" /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: Download & sync community.lst
        id: sync
        run: |
          SOURCE_URL="https://community.antifilter.download/list/community.lst"
          TARGET_FILE="files/community.lst"
          TEMP_FILE="files/community.lst.tmp"
          
          echo "📥 Скачиваю: $SOURCE_URL"
          curl -fsSL "$SOURCE_URL" -o "$TEMP_FILE" || {
            echo "❌ Ошибка загрузки"
            exit 1
          }
          
          # Простое сравнение: если файл не изменился — выходим
          if [ -f "$TARGET_FILE" ] && diff -q "$TARGET_FILE" "$TEMP_FILE" >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Файл не изменился"
            rm -f "$TEMP_FILE"
            exit 0
          fi
          
          mv "$TEMP_FILE" "$TARGET_FILE"
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ community.lst обновлён: $(wc -l < "$TARGET_FILE") строк"

      - name: Convert to SRS format
        if: steps.sync.outputs.changed == 'true'
        run: |
          echo "🔄 Генерация SRS файла..."
          mkdir -p files/srs
          
          # Создаём временный JSON для sing-box (IP CIDR)
          ips=$(grep -v '^$' files/community.lst | jq -R -s 'split("\n") | map(select(length > 0))')
          echo "{\"version\":1,\"rules\":[{\"ip_cidr\":$ips}]}" | jq '.' > /tmp/community.json
          
          # Компилируем в SRS
          sing-box rule-set compile --output files/srs/community.srs /tmp/community.json
          
          SRS_SIZE=$(du -h files/srs/community.srs | cut -f1)
          echo "✅ SRS файл создан: files/srs/community.srs ($SRS_SIZE)"

      - name: Commit and push result
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "RU Blocklist Bot"
          git config user.email "blocklist-bot@github.com"
          
          git pull --rebase origin main 2>/dev/null || true
          
          git add files/community.lst files/srs/community.srs
          
          if ! git diff --staged --quiet; then
            # [skip ci] предотвращает бесконечный цикл запусков
            git commit -m "🔄 Update community.lst and SRS ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
            
            for i in 1 2 3; do
              git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
            done
            echo "📤 Файлы успешно обновлены"
          else
            echo "⏭️ Нет изменений для коммита"
          fi
