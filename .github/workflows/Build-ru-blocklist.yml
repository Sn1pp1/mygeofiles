name: Build RU Blocklist

on:
  push:
    branches: [main]
    paths: ['.github/workflows/Build-ru-blocklist.yml']
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create output directory
      run: mkdir -p files/srs

    - name: Download latest sing-box binary
      run: |
        LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
        echo "Latest version: $LATEST_TAG"
        wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
        tar -xzf "sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
        sudo mv "sing-box-${LATEST_TAG#v}-linux-amd64/sing-box" /usr/local/bin/
        chmod +x /usr/local/bin/sing-box
        sing-box version

    - name: Download & Process Sources
      run: |
        set -euo pipefail

        SOURCES=(
          "https://github.com/Sn1pp1/mygeofiles/raw/refs/heads/main/files/domain-list.txt"
          "https://community.antifilter.download/list/domains.lst"
          "https://github.com/1andrevich/Re-filter-lists/raw/refs/heads/main/community.lst"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Russia/inside-raw.lst"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/youtube.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/discord.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/telegram.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/meta.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google-deepmind.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google-play.list"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/twitch-ads"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/hdrezka.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/tiktok.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/twitter.lst"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/kinopub.list"
        )

        TEMP_RAW=$(mktemp)
        TEMP_CLEAN=$(mktemp)
        trap "rm -f $TEMP_RAW $TEMP_CLEAN" EXIT

        echo "📊 СТАТИСТИКА ЗАГРУЗКИ"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        TOTAL_BEFORE=0
        
        for URL in "${SOURCES[@]}"; do
          SHORT_NAME=$(echo "$URL" | sed 's|.*/\([^/]*/[^/]*\)$|\1|' | cut -c1-40)
          
          # Считаем строки после базовой чистки
          COUNT=$(curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" 2>/dev/null | awk '
          { gsub(/\r/, ""); sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "") }
          /^[[:space:]]*$/ { next }
          /^[[:space:]]*#/ { next }
          /^regexp:/ { next }
          /^include:/ { next }
          { sub(/^\+\./, ""); sub(/^domain:/, ""); sub(/^keyword:/, ""); sub(/^full:/, ""); sub(/^\./, "") }
          /^[[:space:]]*$/ { next }
          /\.$/ { next }
          { d=$0; if (d !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && d != "") c++ }
          END { print c+0 }
          ' 2>/dev/null) || COUNT=0
          
          curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" >> "$TEMP_RAW" 2>/dev/null || true
          
          printf "  %-40s %6s записей\n" "$SHORT_NAME..." "$COUNT"
          TOTAL_BEFORE=$((TOTAL_BEFORE + COUNT))
        done
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  ИТОГО скачано (до очистки):     $TOTAL_BEFORE записей"
        echo ""

        echo "🧹 Очистка и нормализация..."
        
        # === ПАРСЕР (ФИНАЛЬНАЯ ВЕРСИЯ) ===
        awk '
        { gsub(/\r/, ""); sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "") }
        /^[[:space:]]*$/ { next }
        /^[[:space:]]*#/ { next }
        /^regexp:/ { next }
        /^include:/ { next }
        {
          sub(/^\+\./, ""); sub(/^domain:/, ""); sub(/^keyword:/, "")
          sub(/^full:/, ""); sub(/^host:/, ""); sub(/^suffix:/, "")
          sub(/^root:/, ""); sub(/^\./, "")
        }
        /^[[:space:]]*$/ { next }
        /\.$/ { next }
        {
          d = $0
          
          # 1. Очистка WWW-вариаций
          sub(/^www\./, "", d)        # www.example.com -> example.com
          sub(/^www-/, "", d)         # www-example.com -> example.com
          sub(/^www[0-9]+\./, "", d)  # www3.example.com -> example.com
          # wwwfacebook.com -> facebook.com (без использования \1, который ломает awk)
          if (match(d, /^www[a-z]/)) {
            d = substr(d, 4)
          }
          
          # 2. Обрезка мусора в конце/середине
          sub(/@.*$/, "", d)          # domain@tracking -> domain
          sub(/domain:.*$/, "", d)    # domaindomain:tracker -> domain
          sub(/keyword:.*$/, "", d)
          sub(/regexp:.*$/, "", d)
          sub(/full:.*$/, "", d)
          sub(/:[[:space:]]*$/, "", d)
          sub(/\+.*$/, "", d)
          sub(/[[:space:]].*$/, "", d)
          
          # 3. Финальная валидация
          if (d ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/) next  # Убираем чистые IP
          if (d ~ /^[0-9a-f:]+::?[0-9a-f:\/]*$/) next       # Убираем IPv6
          if (d == "") next
          if (d !~ /\./) next                               # Должна быть точка
          if (d ~ /\.\./) next                              # Нет двойных точек
          if (length(d) > 253) next                         # Не слишком длинный
          
          # (Убрана агрессивная проверка на склейку, чтобы не резать ai.google.dev)
          
          print tolower(d)
        }
        ' "$TEMP_RAW" > "$TEMP_CLEAN"
        
        BEFORE_DEDUP=$(wc -l < "$TEMP_CLEAN" | tr -d ' ')
        
        echo "🔍 Сортировка и удаление дубликатов..."
        LC_ALL=C sort -u "$TEMP_CLEAN" > files/ru-blocklist.txt
        
        # Проверка, что файл создан
        if [ ! -s files/ru-blocklist.txt ]; then
          echo "❌ Ошибка: Файл пустой после обработки!"
          exit 1
        fi

        AFTER_DEDUP=$(wc -l < files/ru-blocklist.txt | tr -d ' ')
        REMOVED=$((BEFORE_DEDUP - AFTER_DEDUP))
        SIZE=$(du -h files/ru-blocklist.txt | cut -f1)
        
        if [ "$BEFORE_DEDUP" -gt 0 ]; then
          PCT=$(awk "BEGIN {printf \"%.1f\", $REMOVED * 100 / $BEFORE_DEDUP}")
        else
          PCT="0.0"
        fi
        
        echo ""
        echo "📊 ИТОГОВАЯ СТАТИСТИКА"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        printf "  Записей после чистки:           %6s\n" "$BEFORE_DEDUP"
        printf "  Удалено дубликатов:             %6s (%s%%)\n" "$REMOVED" "$PCT"
        printf "  ✅ В итоговом файле:            %6s доменов\n" "$AFTER_DEDUP"
        printf "  Размер файла:                   %6s\n" "$SIZE"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo " Первые 5 записей из ru-blocklist.txt:"
        head -5 files/ru-blocklist.txt | sed 's/^/   ✓ /'

    - name: Convert to SRS format
      run: |
        echo "🔄 Генерация SRS файла..."
        
        # Создаём временный JSON для sing-box
        domains=$(grep -v '^$' files/ru-blocklist.txt | jq -R -s 'split("\n") | map(select(length > 0))')
        echo "{\"version\":1,\"rules\":[{\"domain_suffix\":$domains}]}" | jq '.' > /tmp/ru-blocklist.json
        
        # Компилируем в SRS
        sing-box rule-set compile --output files/srs/ru-blocklist.srs /tmp/ru-blocklist.json
        
        SRS_SIZE=$(du -h files/srs/ru-blocklist.srs | cut -f1)
        echo "✅ SRS файл создан: files/srs/ru-blocklist.srs ($SRS_SIZE)"

    - name: Commit and push result
      run: |
        git config user.name "RU Blocklist Bot"
        git config user.email "blocklist-bot@github.com"
        
        git pull --rebase origin main 2>/dev/null || true
        
        if [ ! -f files/ru-blocklist.txt ]; then
          echo "❌ Ошибка: файл ru-blocklist.txt не найден!"
          exit 1
        fi

        git add files/ru-blocklist.txt files/srs/ru-blocklist.srs

        if ! git diff --staged --quiet; then
          git commit -m "🔄 Update ru-blocklist.txt and SRS ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
          for i in 1 2 3; do
            git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
          done
          echo "📤 Файлы успешно обновлены"
        else
          echo "⏭️ Списки не изменились, пропуск коммита"
        fi
