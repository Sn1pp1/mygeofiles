name: Build RU Blocklist

on:
  push:
    branches: [main]
    paths: ['.github/workflows/Build-ru-blocklist.yml']
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create output directory
      run: mkdir -p files

    - name: Download & Process Sources
      run: |
        set -euo pipefail

        SOURCES=(
          "https://github.com/Davoyan/xray-routing/raw/refs/heads/main/domains/banned.txt"
          "https://community.antifilter.download/list/domains.lst"
          "https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/community.lst"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Russia/inside-raw.lst"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/category-geoblock-ru"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/youtube.list"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/youtube"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Services/youtube.lst"
          "https://github.com/runetfreedom/russia-blocked-geosite/raw/refs/heads/release/youtube.txt"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/discord.list"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Services/discord.lst"
          "https://github.com/runetfreedom/russia-blocked-geosite/raw/refs/heads/release/discord.txt"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/telegram.list"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/telegram"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Services/telegram.lst"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/meta.list"
          "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Services/meta.lst"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google-deepmind.list"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/google-deepmind"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/google_ai.lst"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google-gemini.list"
          "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google-play.list"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/google-play"
          "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/data/twitch-ads"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/hdrezka.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/tiktok.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Services/twitter.lst"
        )

        TEMP_RAW=$(mktemp)
        TEMP_CLEAN=$(mktemp)
        trap "rm -f $TEMP_RAW $TEMP_CLEAN" EXIT

        echo "📊 СТАТИСТИКА ЗАГРУЗКИ"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        TOTAL_BEFORE=0
        
        for URL in "${SOURCES[@]}"; do
          SHORT_NAME=$(echo "$URL" | sed 's|.*/\([^/]*/[^/]*\)$|\1|' | cut -c1-40)
          
          COUNT=$(curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" 2>/dev/null | awk '
          { gsub(/\r/, ""); sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "") }
          /^[[:space:]]*$/ { next }
          /^[[:space:]]*#/ { next }
          /^regexp:/ { next }
          /^include:/ { next }
          { sub(/^\+\./, ""); sub(/^domain:/, ""); sub(/^keyword:/, ""); sub(/^full:/, ""); sub(/^\./, "") }
          /^[[:space:]]*$/ { next }
          /\.$/ { next }
          { d=$0; if (d !~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && d != "") c++ }
          END { print c+0 }
          ' 2>/dev/null) || COUNT=0
          
          curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" >> "$TEMP_RAW" 2>/dev/null || true
          
          printf "  %-40s %6s записей\n" "$SHORT_NAME..." "$COUNT"
          TOTAL_BEFORE=$((TOTAL_BEFORE + COUNT))
        done
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  ИТОГО скачано (до очистки):     $TOTAL_BEFORE записей"
        echo ""

        echo "🧹 Очистка и фильтрация..."
        
        awk '
        { gsub(/\r/, ""); sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "") }
        /^[[:space:]]*$/ { next }
        /^[[:space:]]*#/ { next }
        /^regexp:/ { next }
        /^include:/ { next }
        {
          sub(/^\+\./, ""); sub(/^domain:/, ""); sub(/^keyword:/, "")
          sub(/^full:/, ""); sub(/^host:/, ""); sub(/^suffix:/, "")
          sub(/^root:/, ""); sub(/^\./, "")
        }
        /^[[:space:]]*$/ { next }
        /\.$/ { next }
        {
          d = $0
          
          # Очистка www-вариаций
          sub(/^www\./, "", d)
          sub(/^www-/, "", d)
          sub(/^www[0-9]+\./, "", d)
          if (match(d, /^www[a-z]/)) {
            d = substr(d, 4)
          }
          
          # Обрезаем мусор
          sub(/@.*$/, "", d)
          sub(/domain:.*$/, "", d)
          sub(/keyword:.*$/, "", d)
          sub(/regexp:.*$/, "", d)
          sub(/full:.*$/, "", d)
          sub(/:[[:space:]]*$/, "", d)
          sub(/\+.*$/, "", d)
          sub(/[[:space:]].*$/, "", d)
          
          # Финальная валидация
          if (d ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/) next
          if (d ~ /^[0-9a-f:]+::?[0-9a-f:\/]*$/) next
          if (d == "") next
          if (d !~ /\./) next
          if (d ~ /\.\./) next
          if (length(d) > 253) next
          
          print tolower(d)
        }
        ' "$TEMP_RAW" > "$TEMP_CLEAN"
        
        BEFORE_DEDUP=$(wc -l < "$TEMP_CLEAN")
        
        echo "🔍 Сортировка и удаление дубликатов..."
        LC_ALL=C sort -u "$TEMP_CLEAN" > files/ru-blocklist
