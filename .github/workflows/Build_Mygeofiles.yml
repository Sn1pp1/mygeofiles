name: Build Mygeofiles
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  SING_BOX_VERSION: '1.11.0'
  MAX_ARTIFACT_SIZE_MB: 50
  DEBUG: ${{ secrets.DEBUG_MODE }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install sing-box
        run: |
          echo "📦 Installing sing-box v${{ env.SING_BOX_VERSION }}..."
          
          SING_BOX_VERSION=${{ env.SING_BOX_VERSION }}
          DOWNLOADED=false
          
          for format in \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box_${SING_BOX_VERSION}_linux_amd64.tar.gz"; do
            if curl -sL --fail --connect-timeout 15 --retry 2 "$format" -o sing-box.tar.gz 2>/dev/null; then
              echo "✅ Downloaded from: $format"
              DOWNLOADED=true
              break
            fi
          done
          
          if [ "$DOWNLOADED" = true ] && file sing-box.tar.gz | grep -qE "gzip|tar"; then
            tar xzf sing-box.tar.gz
            SINGBOX_BIN=$(find . -name "sing-box" -type f 2>/dev/null | head -1)
            
            if [ -n "$SINGBOX_BIN" ]; then
              cp "$SINGBOX_BIN" /usr/local/bin/sing-box
              chmod +x /usr/local/bin/sing-box
              echo "✅ sing-box installed"
              sing-box version
            else
              echo "❌ Binary not found, using go install"
              go install github.com/SagerNet/sing-box/cmd/sing-box@v${SING_BOX_VERSION}
              ln -sf $(go env GOPATH)/bin/sing-box /usr/local/bin/sing-box
            fi
            rm -rf sing-box.tar.gz 2>/dev/null || true
          else
            echo "⚠️  Using go install as fallback"
            go install github.com/SagerNet/sing-box/cmd/sing-box@v${SING_BOX_VERSION}
            ln -sf $(go env GOPATH)/bin/sing-box /usr/local/bin/sing-box
            sing-box version
          fi

      - name: Cache sing-box binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: ${{ runner.os }}-singbox-${{ env.SING_BOX_VERSION }}

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: Setup debug logging
        run: |
          echo "🔧 RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "🔧 RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          if [ "${{ env.DEBUG }}" = "true" ]; then
            set -x
          fi

      - name: Prepare Data
        run: |
          mkdir -p data/geosite data/geoip

          download_with_retry() {
            local url=$1; local dest=$2; local max=3
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && return 1
            for i in $(seq 1 $max); do
              if curl -sL --fail --connect-timeout 15 --retry 2 --retry-delay 2 "$url" -o "$dest"; then
                return 0
              fi
              echo "⚠️ Retry $i/$max for $(basename "$url")"
              sleep $((i * 2))
            done
            echo "❌ Failed: $(basename "$url")"
            return 1
          }

          GEOSITE_URLS=(
            "https://github.com/Sn1pp1/mygeofiles/raw/refs/heads/main/files/domain-list.txt"
            "https://github.com/itdoginfo/allow-domains/releases/latest/download/russia_inside.srs"
            "https://github.com/itdoginfo/allow-domains/releases/latest/download/geoblock.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-antifilter-download-community.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-whatsapp.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-google-gemini.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-google-deepmind.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-discord.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-youtube.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-telegram.srs"
            "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/release/sing-box/category-geoblock-ru.srs"
            "https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/release/sing-box/category-ads.srs"
          )
          
          GEOIP_URLS=(
            "https://github.com/runetfreedom/russia-blocked-geoip/raw/refs/heads/release/srs/ru-blocked.srs"
            "https://github.com/runetfreedom/russia-blocked-geoip/raw/refs/heads/release/srs/ru-blocked-community.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geoip/geoip-re-filter.srs"
            "https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geoip/geoip-telegram.srs"
            "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Subnets/IPv4/discord.lst"
            "https://raw.githubusercontent.com/itdoginfo/allow-domains/refs/heads/main/Subnets/IPv4/meta.lst"
          )

          cat <<'EOF' > parser.py
          import json, sys, os, re
          def extract(obj, target_type):
              res = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if target_type == 'geosite':
                          if k in ['domain_suffix', 'domain']: res.extend(v)
                          elif k == 'domain_keyword': res.extend(['keyword:' + x for x in v])
                          elif k == 'domain_regex':
                              for r in v:
                                  try: re.compile(r); res.append('regexp:' + r)
                                  except: continue
                          else: res.extend(extract(v, target_type))
                      elif target_type == 'geoip':
                          if k == 'ip_cidr': res.extend(v)
                          else: res.extend(extract(v, target_type))
              elif isinstance(obj, list):
                  for item in obj: res.extend(extract(item, target_type))
              return res
          try:
              target, filename = sys.argv[1], sys.argv[2]
              if not os.path.exists('temp.json'): sys.exit(0)
              with open('temp.json', 'r', encoding='utf-8') as f: data = json.load(f)
              results = list(set(filter(None, extract(data, target))))
              if results:
                  with open(f'data/{target}/{filename}', 'w', encoding='utf-8') as f_out:
                      f_out.write('\n'.join(results) + '\n')
                  print(f"✅ Parsed {len(results)} rules")
          except Exception as e: print(f"Parser error: {e}")
          EOF

          process_links() {
            local target=$1; shift
            local links=("$@")
            local failed=0
            for url in "${links[@]}"; do
              [ -z "$url" ] && continue
              full_name=$(python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1].split('/')[-1].strip()))" "$url")
              fname=$(echo "${full_name%.*}" | tr '_' '-' | tr '@' '-' | tr '[:upper:]' '[:lower:]')
              fname=${fname#geosite-}; fname=${fname#geoip-}
              
              echo "⬇️  $full_name → $fname"
              if download_with_retry "$url" "temp_file"; then
                if [[ "$full_name" == *.srs ]]; then
                  echo "   🔧 Attempting to decompile..."
                  if ! DECOMPILE_OUTPUT=$(sing-box rule-set decompile "temp_file" -o "temp.json" 2>&1); then
                    echo "   ⚠️  Decompile failed: $DECOMPILE_OUTPUT"
                    continue
                  fi
                  python3 parser.py "$target" "$fname"
                elif [[ "$full_name" == *.txt || "$full_name" == *.lst ]]; then
                  grep -v '^#' "temp_file" | sed 's/[[:space:]]//g' | grep -v '^$' > "data/$target/$fname" || true
                  count=$(wc -l < "data/$target/$fname")
                  echo "   ✅ Saved $count entries"
                else
                  mv "temp_file" "temp.json"
                  python3 parser.py "$target" "$fname"
                fi
              else
                ((failed++))
              fi
              rm -f temp.json temp_file
            done
            return $failed
          }

          echo "🔄 Processing GEOSITE sources..."
          process_links "geosite" "${GEOSITE_URLS[@]}" || echo "⚠️  Some geosite downloads failed"
          
          echo "🔄 Processing GEOIP sources..."
          process_links "geoip" "${GEOIP_URLS[@]}" || echo "⚠️  Some geoip downloads failed"

      - name: Validate and Cleanup
        run: |
          find data -type f -empty -delete
          
          echo "📊 Final categories:"
          echo "   • geosite: $(ls -1 data/geosite 2>/dev/null | wc -l) files"
          echo "   • geoip: $(ls -1 data/geoip 2>/dev/null | wc -l) files"
          
          if [ -z "$(ls -A data/geosite 2>/dev/null)" ]; then
            echo "❌ Error: No geosite data generated!"
            exit 1
          fi

      - name: Build geosite.dat
        run: |
          echo "🔨 Building geosite.dat..."
          go run github.com/v2fly/domain-list-community@latest \
            --datapath=data/geosite --outputname=geosite.dat
          ls -lh geosite.dat

      - name: Build geoip.dat
        run: |
          echo "🔨 Building geoip.dat..."
          cat <<EOF > geoip_config.json
          {"input": [{"type": "text", "action": "add", "args": {"inputDir": "data/geoip"}}],
           "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputDir": ".", "outputName": "geoip.dat"}}]}
          EOF
          go install github.com/v2fly/geoip@latest
          $(go env GOPATH)/bin/geoip -c geoip_config.json
          ls -lh geoip.dat

      - name: Test with sing-box check
        run: |
          echo "🧪 Testing generated files..."
          cat <<EOF > test_config.json
          {
            "log": {"level": "error"},
            "route": {
              "rules": [
                {"geosite": ["category-ads-all"], "action": "block"},
                {"geoip": ["private", "cn"], "action": "block"},
                {"geosite": ["google", "telegram"], "action": "direct"}
              ]
            }
          }
          EOF
          if sing-box check -c test_config.json 2>&1; then
            echo "✅ sing-box config validation passed"
          else
            echo "⚠️  sing-box check reported issues (non-fatal)"
          fi

      - name: Check artifact sizes
        run: |
          echo "📏 Checking artifact sizes (max: ${{ env.MAX_ARTIFACT_SIZE_MB }}MB)..."
          for f in geosite.dat geoip.dat; do
            if [ -f "$f" ]; then
              size=$(du -m "$f" | cut -f1)
              if [ "$size" -gt "${{ env.MAX_ARTIFACT_SIZE_MB }}" ]; then
                echo "❌ $f is ${size}MB (exceeds limit)"
                exit 1
              fi
              echo "✅ $f: ${size}MB"
            else
              echo "❌ $f not found!"
              exit 1
            fi
          done

      - name: Generate SHA256
        run: |
          echo "🔐 Generating checksums..."
          sha256sum geosite.dat > geosite.dat.sha256
          sha256sum geoip.dat > geoip.dat.sha256
          cat geosite.dat.sha256 geoip.dat.sha256

      - name: Generate changelog
        run: |
          echo "## 🔄 Build #${{ github.run_number }}" > changelog.md
          echo "" >> changelog.md
          echo "**📅 Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> changelog.md
          echo "**🔗 Run:** [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> changelog.md
          echo "**🔖 Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> changelog.md
          echo "" >> changelog.md
          echo "### 📦 Contents" >> changelog.md
          echo "- **Geosite categories:** $(ls -1 data/geosite 2>/dev/null | wc -l)" >> changelog.md
          echo "- **Geoip categories:** $(ls -1 data/geoip 2>/dev/null | wc -l)" >> changelog.md
          echo "- **geosite.dat size:** $(du -h geosite.dat | cut -f1)" >> changelog.md
          echo "- **geoip.dat size:** $(du -h geoip.dat | cut -f1)" >> changelog.md
          echo "" >> changelog.md
          echo "### 🔐 Checksums" >> changelog.md
          echo "\`\`\`" >> changelog.md
          cat geosite.dat.sha256 geoip.dat.sha256 >> changelog.md
          echo "\`\`\`" >> changelog.md
          cat changelog.md

      # ============================================
      # 📤 PUSH FILES TO BRANCH (FIXED - REMOVE & RE-ADD)
      # ============================================
      - name: Push Files to Branch
        run: |
          echo "📤 Pushing artifacts to repository..."
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Проверяем файлы
          echo "📁 Files to push:"
          ls -lh geosite.dat geoip.dat geosite.dat.sha256 geoip.dat.sha256
          
          # Удаляем из git cache (но не с диска!)
          echo "🗑️  Removing from git cache..."
          git rm --cached geosite.dat geoip.dat geosite.dat.sha256 geoip.dat.sha256 2>/dev/null || true
          
          # Принудительно добавляем заново
          echo "📋 Adding files forcefully..."
          git add -f geosite.dat geoip.dat geosite.dat.sha256 geoip.dat.sha256
          
          # Проверяем что добавлено
          echo "📊 Git status:"
          git status --short
          
          # Коммитим
          echo "💾 Creating commit..."
          git commit --allow-empty -m "🔄 Update dat files [Build #${{ github.run_number }}]

          Built: $(date -u '+%Y-%m-%d %H:%M UTC')
          Geosite: $(ls -1 data/geosite | wc -l) categories
          Geoip: $(ls -1 data/geoip | wc -l) categories
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Пушим
          echo "🚀 Pushing..."
          git push origin main --force
          
          echo "✅ Done!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🔄 Auto-build #${{ github.run_number }} (${{ env.BUILD_DATE }})"
          body_path: changelog.md
          make_latest: true
          files: |
            geosite.dat
            geoip.dat
            geosite.dat.sha256
            geoip.dat.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
