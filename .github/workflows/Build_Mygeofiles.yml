name: Build Mygeofiles
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  MAX_ARTIFACT_SIZE_MB: 50
  DEBUG: ${{ secrets.DEBUG_MODE }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Go version
        run: |
          GO_VERSION=$(curl -s https://go.dev/VERSION?m=text | head -n 1 | sed 's/go//' | cut -d. -f1,2)
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_ENV
          echo "✅ Using Go v$GO_VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Get latest sing-box version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | cut -c2-)
          echo "SING_BOX_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "✅ Using sing-box v$LATEST_VERSION"

      - name: Install sing-box
        run: |
          echo "📦 Installing sing-box v${{ env.SING_BOX_VERSION }}..."
          
          SING_BOX_VERSION=${{ env.SING_BOX_VERSION }}
          DOWNLOADED=false
          
          for format in \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box_${SING_BOX_VERSION}_linux_amd64.tar.gz"; do
            if curl -sL --fail --connect-timeout 15 --retry 2 "$format" -o sing-box.tar.gz 2>/dev/null; then
              echo "✅ Downloaded from: $format"
              DOWNLOADED=true
              break
            fi
          done
          
          if [ "$DOWNLOADED" = true ] && file sing-box.tar.gz | grep -qE "gzip|tar"; then
            tar xzf sing-box.tar.gz
            SINGBOX_BIN=$(find . -name "sing-box" -type f 2>/dev/null | head -1)
            
            if [ -n "$SINGBOX_BIN" ]; then
              cp "$SINGBOX_BIN" /usr/local/bin/sing-box
              chmod +x /usr/local/bin/sing-box
              echo "✅ sing-box installed"
              sing-box version
            else
              echo "❌ Binary not found, using go install"
              go install github.com/SagerNet/sing-box/cmd/sing-box@v${SING_BOX_VERSION}
              ln -sf $(go env GOPATH)/bin/sing-box /usr/local/bin/sing-box
            fi
            rm -rf sing-box.tar.gz 2>/dev/null || true
          else
            echo "⚠️ Using go install as fallback"
            go install github.com/SagerNet/sing-box/cmd/sing-box@v${SING_BOX_VERSION}
            ln -sf $(go env GOPATH)/bin/sing-box /usr/local/bin/sing-box
            sing-box version
          fi

      - name: Cache sing-box binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: ${{ runner.os }}-singbox-${{ env.SING_BOX_VERSION }}

      - name: Set build date
        run: |
          echo "BUILD_DATE=$(TZ=Europe/Moscow date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "BUILD_TIME=$(TZ=Europe/Moscow date '+%H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_DATETIME=$(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M MSK')" >> $GITHUB_ENV

      - name: Setup debug logging
        run: |
          echo "🔧 RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "🔧 RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          if [ "${{ env.DEBUG }}" = "true" ]; then
            set -x
          fi

      - name: Prepare Data
        run: |
          mkdir -p data/geosite data/geoip

          download_with_retry() {
            local url=$1; local dest=$2; local max=3
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && return 1
            for i in $(seq 1 $max); do
              if curl -sL --fail --connect-timeout 15 --retry 2 --retry-delay 2 "$url" -o "$dest"; then
                return 0
              fi
              echo "⚠️ Retry $i/$max for $(basename "$url")"
              sleep $((i * 2))
            done
            echo "❌ Failed: $(basename "$url")"
            return 1
          }

          declare -A GEOSITE=(
            ["category-ads"]="https://github.com/hydraponique/roscomvpn-geosite/raw/refs/heads/master/release/sing-box/category-ads.srs"
            ["private"]="https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-private.srs"
            ["domain-list"]="https://github.com/Sn1pp1/mygeofiles/raw/refs/heads/main/files/domain-list.txt"
            ["ru-banned"]="https://github.com/Davoyan/xray-routing/raw/refs/heads/main/domains/banned.txt"
            ["ru-blocklist"]="https://github.com/Sn1pp1/mygeofiles/raw/refs/heads/main/files/ru-blocklist.txt"
            ["ru-blocked"]="https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geosite/geosite-ru-blocked.srs"
          )

          declare -A GEOIP=(
            ["private-ip"]="https://github.com/runetfreedom/russia-v2ray-rules-dat/raw/refs/heads/release/sing-box/rule-set-geoip/geoip-private.srs"
            ["ru-blocked-ip"]="https://github.com/runetfreedom/russia-blocked-geoip/raw/refs/heads/release/srs/ru-blocked.srs"
            ["ru-blocked-community-ip"]="https://github.com/runetfreedom/russia-blocked-geoip/raw/refs/heads/release/srs/ru-blocked-community.srs"
          )

          cat <<'EOF' > parser.py
          import json, sys, os, re
          def extract(obj, target_type):
              res = []
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if target_type == 'geosite':
                          if k in ['domain_suffix', 'domain']: res.extend(v)
                          elif k == 'domain_keyword': res.extend(['keyword:' + x for x in v])
                          elif k == 'domain_regex':
                              for r in v:
                                  try: re.compile(r); res.append('regexp:' + r)
                                  except: continue
                          else: res.extend(extract(v, target_type))
                      elif target_type == 'geoip':
                          if k == 'ip_cidr': res.extend(v)
                          else: res.extend(extract(v, target_type))
              elif isinstance(obj, list):
                  for item in obj: res.extend(extract(item, target_type))
              return res
          try:
              target, filename = sys.argv[1], sys.argv[2]
              if not os.path.exists('temp.json'): sys.exit(0)
              with open('temp.json', 'r', encoding='utf-8') as f: data = json.load(f)
              results = list(set(filter(None, extract(data, target))))
              if results:
                  with open(f'data/{target}/{filename}', 'w', encoding='utf-8') as f_out:
                      f_out.write('\n'.join(results) + '\n')
                  print(f"✅ Parsed {len(results)} rules")
          except Exception as e: print(f"Parser error: {e}")
          EOF

          process_categories() {
            local target=$1
            shift
            local -n categories=$1
            
            local failed=0
            
            for name in "${!categories[@]}"; do
              local url="${categories[$name]}"
              [ -z "$url" ] && continue
              
              echo ""
              echo "⬇️  [$target] $name"
              echo "    URL: $url"
              
              if ! download_with_retry "$url" "temp_file"; then
                echo "  ❌ Не удалось скачать"
                ((failed++))
                continue
              fi
              
              local ext="${url##*.}"
              local output_path="data/$target/$name"
              
              if [[ "$url" == *.srs ]]; then
                echo "  🔧 Декомпилируем .srs..."
                if ! sing-box rule-set decompile "temp_file" -o "temp.json" 2>&1; then
                  echo "  ⚠️  Декомпиляция не удалась, пропускаем"
                  rm -f temp_file
                  ((failed++))
                  continue
                fi
                python3 parser.py "$target" "$name"
                
              elif [[ "$ext" == "txt" || "$ext" == "lst" ]]; then
                echo "  📝 Обрабатываем текстовый список..."
                grep -v '^#' "temp_file" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' > "$output_path" || true
                count=$(wc -l < "$output_path" 2>/dev/null || echo 0)
                echo "  ✅ Сохранено: $count записей → $output_path"
                
              else
                mv "temp_file" "temp.json"
                python3 parser.py "$target" "$name"
              fi
              
              rm -f temp.json temp_file 2>/dev/null || true
            done
            
            return $failed
          }

          echo "🔄 Processing GEOSITE categories..."
          process_categories "geosite" GEOSITE || echo "⚠️  Некоторые geosite не обработаны"
          
          echo "🔄 Processing GEOIP categories..."
          process_categories "geoip" GEOIP || echo "⚠️  Некоторые geoip не обработаны"

      - name: Validate and Cleanup
        run: |
          find data -type f -empty -delete
          
          echo "📊 Final categories:"
          echo "   • geosite: $(ls -1 data/geosite 2>/dev/null | wc -l) files"
          echo "   • geoip: $(ls -1 data/geoip 2>/dev/null | wc -l) files"
          
          echo "📋 File contents preview:"
          for f in data/geosite/*; do
            if [ -f "$f" ]; then
              lines=$(wc -l < "$f")
              echo "   • $(basename "$f"): $lines lines"
              if [ "$lines" -eq 0 ]; then
                echo "     ⚠️  WARNING: File is empty!"
              fi
            fi
          done
          
          if [ -z "$(ls -A data/geosite 2>/dev/null)" ]; then
            echo "❌ Error: No geosite data generated!"
            exit 1
          fi

      - name: Clean and Normalize Domains
        run: |
          echo "🧹 Cleaning and normalizing domain files..."
          
          for file in data/geosite/*; do
            [ -f "$file" ] || continue
            
            filename=$(basename "$file")
            echo "   • Processing $filename..."
            
            sed -E '
              s/^[[:space:]"'"'"']+//
              s/[[:space:]"'"'"']+$//
              /^$/d
              /^#/d
              s/^\*\.(.+)\.\*$/.\1/
              s/^\*\.(.+)$/.\1/
              s/\.\././g
            ' "$file" | \
            grep -E '^(full:|regexp:|keyword:|domain:|domain_suffix:|domain_keyword:|domain_regex:)?[a-zA-Z0-9@.*-]' | \
            sort -u > "$file.cleaned"
            
            mv "$file.cleaned" "$file"
            
            count=$(wc -l < "$file")
            if [ "$count" -eq 0 ]; then
              echo "     ⚠️  WARNING: File is empty after cleaning!"
            else
              echo "     ✅ Cleaned: $count entries"
            fi
          done
          
          echo "✅ Domain normalization complete"

      - name: Build geosite.dat
        run: |
          echo "🔨 Building geosite.dat..."
          
          empty_files=0
          for f in data/geosite/*; do
            if [ -f "$f" ] && [ ! -s "$f" ]; then
              echo "⚠️  Warning: $(basename "$f") is empty"
              ((empty_files++))
            fi
          done
          
          if [ "$empty_files" -gt 0 ]; then
            echo "⚠️  $empty_files empty files found, but continuing..."
          fi
          
          go run github.com/v2fly/domain-list-community@latest \
            --datapath=data/geosite --outputname=geosite.dat
          
          if [ -f geosite.dat ]; then
            ls -lh geosite.dat
          else
            echo "❌ geosite.dat was not created!"
            exit 1
          fi

      - name: Build geoip.dat
        run: |
          echo "🔨 Building geoip.dat..."
          cat <<EOF > geoip_config.json
          {"input": [{"type": "text", "action": "add", "args": {"inputDir": "data/geoip"}}],
           "output": [{"type": "v2rayGeoIPDat", "action": "output", "args": {"outputDir": ".", "outputName": "geoip.dat"}}]}
          EOF
          go install github.com/v2fly/geoip@latest
          $(go env GOPATH)/bin/geoip -c geoip_config.json
          ls -lh geoip.dat

      - name: Validate generated files
        run: |
          echo "🔍 Validating generated files..."
          
          echo "Checking geosite.dat..."
          if ! file geosite.dat | grep -q "data"; then
            echo "❌ geosite.dat is invalid or corrupted"
            exit 1
          fi
          
          echo "Checking geoip.dat..."
          if ! file geoip.dat | grep -q "data"; then
            echo "❌ geoip.dat is invalid or corrupted"
            exit 1
          fi
          
          echo "✅ All files validated successfully"

      - name: Health check
        run: |
          echo "🏥 Running health checks..."
          
          geosite_size=$(stat -c%s geosite.dat 2>/dev/null || stat -f%z geosite.dat 2>/dev/null)
          geoip_size=$(stat -c%s geoip.dat 2>/dev/null || stat -f%z geoip.dat 2>/dev/null)
          
          echo "   • geosite.dat: ${geosite_size} bytes"
          echo "   • geoip.dat: ${geoip_size} bytes"
          
          if [ "$geosite_size" -lt 1000 ]; then
            echo "❌ geosite.dat too small (${geosite_size} bytes) - possible corruption"
            exit 1
          fi
          
          if [ "$geoip_size" -lt 1000 ]; then
            echo "❌ geoip.dat too small (${geoip_size} bytes) - possible corruption"
            exit 1
          fi
          
          echo "✅ Health check passed"

      - name: Generate statistics
        run: |
          echo "📊 Generating statistics..."
          
          {
            echo "## 📈 Build Statistics"
            echo ""
            echo "### Geosite Categories"
            echo ""
            echo "| Category | Entries |"
            echo "|----------|---------|"
            for f in data/geosite/*; do
              if [ -f "$f" ]; then
                name=$(basename "$f")
                count=$(wc -l < "$f")
                echo "| $name | $count |"
              fi
            done
            echo ""
            echo "### Geoip Categories"
            echo ""
            echo "| Category | Entries |"
            echo "|----------|---------|"
            for f in data/geoip/*; do
              if [ -f "$f" ]; then
                name=$(basename "$f")
                count=$(wc -l < "$f")
                echo "| $name | $count |"
              fi
            done
          } > statistics.md
          
          cat statistics.md

      # ✅ ШАГ "Compress artifacts" УДАЛЕН

      - name: Check artifact sizes
        run: |
          echo "📏 Checking artifact sizes (max: ${{ env.MAX_ARTIFACT_SIZE_MB }}MB)..."
          for f in geosite.dat geoip.dat; do
            if [ -f "$f" ]; then
              size=$(du -m "$f" | cut -f1)
              if [ "$size" -gt "${{ env.MAX_ARTIFACT_SIZE_MB }}" ]; then
                echo "❌ $f is ${size}MB (exceeds limit)"
                exit 1
              fi
              echo "✅ $f: ${size}MB"
            else
              echo "❌ $f not found!"
              exit 1
            fi
          done

      - name: Generate SHA256
        run: |
          echo "🔐 Generating checksums..."
          sha256sum geosite.dat > geosite.dat.sha256
          sha256sum geoip.dat > geoip.dat.sha256
          cat geosite.dat.sha256 geoip.dat.sha256

      - name: Generate changelog
        run: |
          {
            echo "## 🔄 Build #${{ github.run_number }}"
            echo ""
            echo "**📅 Built:** $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M MSK')"
            echo "**🔗 Run:** [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "**🔖 Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "### 📦 Contents"
            echo "- **Geosite categories:** $(ls -1 data/geosite 2>/dev/null | wc -l)"
            echo "- **Geoip categories:** $(ls -1 data/geoip 2>/dev/null | wc -l)"
            echo "- **geosite.dat size:** $(du -h geosite.dat | cut -f1)"
            echo "- **geoip.dat size:** $(du -h geoip.dat | cut -f1)"
            echo ""
            echo "### 🔐 Checksums"
            echo "\`\`\`"
            cat geosite.dat.sha256 geoip.dat.sha256
            echo "\`\`\`"
            echo ""
            echo "### 📊 Statistics"
            cat statistics.md
          } > changelog.md
          
          cat changelog.md

      - name: Push Files to Branch
        run: |
          echo "📤 Pushing artifacts..."
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "📁 Files:"
          ls -lh geosite.dat geoip.dat geosite.dat.sha256 geoip.dat.sha256
          
          echo "🗑️  Removing from Git index..."
          git rm --cached -f geosite.dat geoip.dat geosite.dat.sha256 geoip.dat.sha256 || true
          
          echo "📋 Adding as new files..."
          git add -f geosite.dat
          git add -f geoip.dat
          git add -f geosite.dat.sha256
          git add -f geoip.dat.sha256
          
          echo "📊 Status:"
          git status --short
          
          COMMIT_MSG="🔄 Update dat files [Build #${{ github.run_number }}] - $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M MSK')"
          git commit -m "$COMMIT_MSG" || echo "⚠️ No changes"
          
          git push origin main --force
          
          echo "✅ Done!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🔄 Auto-build #${{ github.run_number }} (${{ env.BUILD_DATE }})"
          body_path: changelog.md
          make_latest: true
          files: |
            geosite.dat
            geoip.dat
            geosite.dat.sha256
            geoip.dat.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
