name: Build sing-box SRS

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  DEBUG: ${{ secrets.DEBUG_MODE }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 🔧 SETUP PYTHON (AUTO-LATEST)
      # ============================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # ✅ Убрал cache: 'pip'

      - name: Install requests
        run: pip install requests

      # ============================================
      # 🔧 GET LATEST SING-BOX VERSION
      # ============================================
      - name: Get latest sing-box version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | cut -c2-)
          echo "SING_BOX_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "✅ Using sing-box v$LATEST_VERSION"

      # ============================================
      # 🔧 CACHE SING-BOX BINARY
      # ============================================
      - name: Cache sing-box binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: ${{ runner.os }}-singbox-${{ env.SING_BOX_VERSION }}

      # ============================================
      # 🔧 INSTALL SING-BOX
      # ============================================
      - name: Install sing-box CLI
        run: |
          echo "📦 Installing sing-box v${{ env.SING_BOX_VERSION }}..."
          
          SING_BOX_VERSION=${{ env.SING_BOX_VERSION }}
          
          if [ -f /usr/local/bin/sing-box ]; then
            echo "✅ sing-box found in cache"
            sing-box version
            exit 0
          fi
          
          DOWNLOADED=false
          
          for format in \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box_${SING_BOX_VERSION}_linux_amd64.tar.gz"; do
            if curl -sL --fail --connect-timeout 15 --retry 2 "$format" -o sing-box.tar.gz 2>/dev/null; then
              echo "✅ Downloaded from: $format"
              DOWNLOADED=true
              break
            fi
          done
          
          if [ "$DOWNLOADED" = true ] && file sing-box.tar.gz | grep -qE "gzip|tar"; then
            tar xzf sing-box.tar.gz
            SINGBOX_BIN=$(find . -name "sing-box" -type f 2>/dev/null | head -1)
            
            if [ -n "$SINGBOX_BIN" ]; then
              sudo install "$SINGBOX_BIN" /usr/local/bin/sing-box
              chmod +x /usr/local/bin/sing-box
              echo "✅ sing-box installed"
              sing-box version
            else
              echo "❌ Binary not found"
              exit 1
            fi
            rm -rf sing-box.tar.gz $(tar tzf sing-box.tar.gz | head -1 | cut -f1 -d"/") 2>/dev/null || true
          else
            echo "❌ Failed to download sing-box"
            exit 1
          fi

      # ============================================
      # 🔨 BUILD SRS FILES
      # ============================================
      - name: Build SRS files
        run: |
          echo "🔨 Building SRS files..."
          
          if [ ! -f "scripts/build-rules.py" ]; then
            echo "❌ scripts/build-rules.py not found!"
            exit 1
          fi
          
          python scripts/build-rules.py
          
          if [ -f "files/block.srs" ] && [ -f "files/direct.srs" ]; then
            echo "✅ SRS files built successfully"
            ls -lh files/*.srs
          else
            echo "❌ Failed to build SRS files"
            exit 1
          fi

      # ============================================
      # 📋 SET BUILD DATETIME (MSK)
      # ============================================
      - name: Set build datetime
        run: |
          echo "BUILD_DATETIME=$(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M MSK')" >> $GITHUB_ENV

      # ============================================
      # 📤 COMMIT AND PUSH
      # ============================================
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Auto-update SRS - ${{ env.BUILD_DATETIME }}'
          file_pattern: 'files/block.srs files/direct.srs'
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
