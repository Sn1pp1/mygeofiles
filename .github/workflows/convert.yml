name: Convert domains to MRS

on:
  push:
    paths:
      - 'files/domain-list.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🔄 Convert TXT to MRS
        run: |
          python scripts/convert.py files/domain-list.txt files/domain-list.mrs
      
      - name: 🕐 Get current time
        id: time
        run: echo "datetime=$(date '+%Y-%m-%d %H:%M MSK')" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit and push MRS
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Auto-generate domain-list.mrs - ${{ steps.time.outputs.datetime }}'
          file_pattern: 'files/domain-list.mrs'
          commit_options: '--no-verify'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
          commit_author: 'GitHub Actions <actions@github.com>'
