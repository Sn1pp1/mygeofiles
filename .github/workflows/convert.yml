name: Convert domains to MRS

on:
  push:
    paths:
      - 'files/domain-list.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🔄 Convert TXT to MRS
        run: |
          python scripts/convert.py files/domain-list.txt files/domain-list.mrs
      
      - name: 🕐 Get current time in MSK
        id: time
        run: |
          echo "datetime=$(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK')" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add files/domain-list.mrs
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-generate MRS - ${{ steps.time.outputs.datetime }}"
          git push
