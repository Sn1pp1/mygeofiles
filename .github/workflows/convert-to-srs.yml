name: Convert to SRS Format

on:
  push:
    paths:
      - 'files/community.lst'
      - 'files/domain-list.txt'
      - 'files/ru-blocklist.txt'
  workflow_dispatch:

jobs:
  convert-to-srs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create srs directory
        run: mkdir -p files/srs
      
      - name: Download sing-box binary
        run: |
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.10.0/sing-box-1.10.0-linux-amd64.tar.gz
          tar -xzf sing-box-1.10.0-linux-amd64.tar.gz
          sudo mv sing-box-1.10.0-linux-amd64/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
      
      - name: Convert community.lst to SRS (IP CIDR)
        run: |
          # Create source format JSON for IP CIDR
          echo '{"version":1,"rules":[{"ip_cidr":[' > files/srs/community.json
          
          # Add IP CIDR entries
          first=true
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ -n "$line" ]]; then
              if [ "$first" = true ]; then
                echo -n "\"$line\"" >> files/srs/community.json
                first=false
              else
                echo -n ",\"$line\"" >> files/srs/community.json
              fi
            fi
          done < files/community.lst
          
          echo ']}]}' >> files/srs/community.json
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/community.srs files/srs/community.json
      
      - name: Convert domain-list.txt to SRS (domain suffix)
        run: |
          # Create source format JSON for domain suffix
          echo '{"version":1,"rules":[{"domain_suffix":[' > files/srs/domain-list.json
          
          # Add domain entries
          first=true
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ -n "$line" ]]; then
              if [ "$first" = true ]; then
                echo -n "\"$line\"" >> files/srs/domain-list.json
                first=false
              else
                echo -n ",\"$line\"" >> files/srs/domain-list.json
              fi
            fi
          done < files/domain-list.txt
          
          echo ']}]}' >> files/srs/domain-list.json
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/domain-list.srs files/srs/domain-list.json
      
      - name: Convert ru-blocklist.txt to SRS (domain suffix)
        run: |
          # Create source format JSON for domain suffix
          echo '{"version":1,"rules":[{"domain_suffix":[' > files/srs/ru-blocklist.json
          
          # Add domain entries
          first=true
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ -n "$line" ]]; then
              if [ "$first" = true ]; then
                echo -n "\"$line\"" >> files/srs/ru-blocklist.json
                first=false
              else
                echo -n ",\"$line\"" >> files/srs/ru-blocklist.json
              fi
            fi
          done < files/ru-blocklist.txt
          
          echo ']}]}' >> files/srs/ru-blocklist.json
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/ru-blocklist.srs files/srs/ru-blocklist.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add files/srs/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update SRS files ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          else
            echo "No changes to commit"
          fi
