name: Convert to SRS Format

on:
  push:
    paths:
      - 'files/community.lst'
      - 'files/domain-list.txt'
      - 'files/ru-blocklist.txt'
  workflow_dispatch:

jobs:
  convert-to-srs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create srs directory
        run: mkdir -p files/srs
      
      - name: Download sing-box binary
        run: |
          wget https://github.com/SagerNet/sing-box/releases/download/v1.10.0/sing-box-1.10.0-linux-amd64.tar.gz
          tar -xzf sing-box-1.10.0-linux-amd64.tar.gz
          sudo mv sing-box-1.10.0-linux-amd64/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
      
      - name: Convert community.lst to SRS
        run: |
          # Create JSON for IP CIDR
          cat > files/srs/community.json << 'EOF'
          {
            "version": 3,
            "rules": [
              {
                "ip_cidr": [
          EOF
          
          # Add IP CIDR entries
          sed 's/^/                  "/; s/$/",/' files/community.lst | head -n -1 >> files/srs/community.lst
          sed -n '$ s/^/                  "/; s/$/"\n/' files/community.lst >> files/srs/community.json
          
          cat >> files/srs/community.json << 'EOF'
                ]
              }
            ]
          }
          EOF
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/community.srs files/srs/community.json
      
      - name: Convert domain-list.txt to SRS
        run: |
          # Create JSON for domain suffix
          cat > files/srs/domain-list.json << 'EOF'
          {
            "version": 3,
            "rules": [
              {
                "domain_suffix": [
          EOF
          
          # Add domain entries
          sed 's/^/                  "/; s/$/",/' files/domain-list.txt | head -n -1 >> files/srs/domain-list.json
          sed -n '$ s/^/                  "/; s/$/"\n/' files/domain-list.txt >> files/srs/domain-list.json
          
          cat >> files/srs/domain-list.json << 'EOF'
                ]
              }
            ]
          }
          EOF
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/domain-list.srs files/srs/domain-list.json
      
      - name: Convert ru-blocklist.txt to SRS
        run: |
          # Create JSON for domain suffix
          cat > files/srs/ru-blocklist.json << 'EOF'
          {
            "version": 3,
            "rules": [
              {
                "domain_suffix": [
          EOF
          
          # Add domain entries
          sed 's/^/                  "/; s/$/",/' files/ru-blocklist.txt | head -n -1 >> files/srs/ru-blocklist.json
          sed -n '$ s/^/                  "/; s/$/"\n/' files/ru-blocklist.txt >> files/srs/ru-blocklist.json
          
          cat >> files/srs/ru-blocklist.json << 'EOF'
                ]
              }
            ]
          }
          EOF
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/ru-blocklist.srs files/srs/ru-blocklist.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add files/srs/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update SRS files ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          else
            echo "No changes to commit"
          fi
