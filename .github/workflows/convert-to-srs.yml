name: Convert to SRS Format

on:
  push:
    paths:
      - 'files/community.lst'
      - 'files/domain-list.txt'
      - 'files/ru-blocklist.txt'
      - 'files/*.lst'
      - 'files/*.txt'
  workflow_dispatch:

jobs:
  convert-to-srs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
      
      - name: Check if source files changed
        id: check
        run: |
          if git diff HEAD~1 --name-only | grep -qE 'files/(community\.lst|domain-list\.txt|ru-blocklist\.txt)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create srs directory
        run: mkdir -p files/srs
      
      - name: Download latest sing-box binary
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo "Latest version: $LATEST_TAG"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          sudo mv "sing-box-${LATEST_TAG#v}-linux-amd64/sing-box" /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
          sing-box version
      
      - name: Convert community.lst to SRS (IP CIDR)
        if: steps.check.outputs.changed == 'true'
        run: |
          if [ -f files/community.lst ]; then
            ips=$(grep -v '^$' files/community.lst | jq -R -s 'split("\n") | map(select(length > 0))')
            echo "{\"version\":1,\"rules\":[{\"ip_cidr\":$ips}]}" | jq '.' > files/srs/community.json
            sing-box rule-set compile --output files/srs/community.srs files/srs/community.json
            echo "✓ community.lst converted"
          fi
      
      - name: Convert domain-list.txt to SRS (domain suffix)
        if: steps.check.outputs.changed == 'true'
        run: |
          if [ -f files/domain-list.txt ]; then
            domains=$(grep -v '^$' files/domain-list.txt | jq -R -s 'split("\n") | map(select(length > 0))')
            echo "{\"version\":1,\"rules\":[{\"domain_suffix\":$domains}]}" | jq '.' > files/srs/domain-list.json
            sing-box rule-set compile --output files/srs/domain-list.srs files/srs/domain-list.json
            echo "✓ domain-list.txt converted"
          fi
      
      - name: Convert ru-blocklist.txt to SRS (domain suffix)
        if: steps.check.outputs.changed == 'true'
        run: |
          if [ -f files/ru-blocklist.txt ]; then
            domains=$(grep -v '^$' files/ru-blocklist.txt | jq -R -s 'split("\n") | map(select(length > 0))')
            echo "{\"version\":1,\"rules\":[{\"domain_suffix\":$domains}]}" | jq '.' > files/srs/ru-blocklist.json
            sing-box rule-set compile --output files/srs/ru-blocklist.srs files/srs/ru-blocklist.json
            echo "✓ ru-blocklist.txt converted"
          fi
      
      - name: Commit JSON files
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add files/srs/*.json
          if ! git diff --cached --quiet; then
            MSK_TIME=$(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M MSK')
            git commit -m "🔄 Update JSON files ($MSK_TIME)"
            git push
          else
            echo "No JSON changes to commit"
          fi
      
      - name: Commit SRS files
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add files/srs/*.srs
          if ! git diff --cached --quiet; then
            MSK_TIME=$(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M MSK')
            git commit -m "🔄 Update SRS files ($MSK_TIME)"
            git push
          else
            echo "No SRS changes to commit"
          fi
