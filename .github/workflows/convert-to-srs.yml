name: Convert to SRS Format

on:
  push:
    paths:
      - 'files/domain-list.txt'
  workflow_dispatch:

jobs:
  convert-to-srs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create srs directory
        run: mkdir -p files/srs
      
      - name: Download latest sing-box binary
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo "Latest version: $LATEST_TAG"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
          sudo mv "sing-box-${LATEST_TAG#v}-linux-amd64/sing-box" /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
          sing-box version
      
      - name: Convert domain-list.txt to SRS
        run: |
          # Create temporary JSON
          domains=$(grep -v '^$' files/domain-list.txt | jq -R -s 'split("\n") | map(select(length > 0))')
          echo "{\"version\":1,\"rules\":[{\"domain_suffix\":$domains}]}" | jq '.' > /tmp/domain-list.json
          
          # Compile to SRS
          sing-box rule-set compile --output files/srs/domain-list.srs /tmp/domain-list.json
          echo "✓ domain-list.srs created"
      
      - name: Commit SRS file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add files/srs/domain-list.srs
          if ! git diff --cached --quiet; then
            MSK_TIME=$(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M MSK')
            git commit -m "🔄 Update domain-list.srs ($MSK_TIME)"
            git push
          else
            echo "No changes to commit"
          fi
