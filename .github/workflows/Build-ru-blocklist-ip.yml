name: Build-ru-blocklist-ip

on:
  push:
    branches: [main]
    paths: ['.github/workflows/Build-ru-blocklist-ip.yml']
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов (00:00, 06:00, 12:00, 18:00 UTC)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create output directory
      run: mkdir -p files

    - name: Download & Process IP Sources
      run: |
        set -euo pipefail

        # ==========================================
        #  ВАШ СПИСОК ИСТОЧНИКОВ (в оригинальном порядке)
        # ==========================================
        IP_SOURCES=(
          "https://antifilter.download/list/allyouneed.lst"
          "https://community.antifilter.download/list/community.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv6/discord.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv4/discord.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv6/telegram.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv4/telegram.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv6/meta.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv4/meta.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv6/twitter.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv4/twitter.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv6/google_meet.lst"
          "https://github.com/itdoginfo/allow-domains/raw/refs/heads/main/Subnets/IPv4/google_meet.lst"
        )
        # ==========================================

        TEMP_RAW=$(mktemp)
        TEMP_CLEAN=$(mktemp)
        trap "rm -f $TEMP_RAW $TEMP_CLEAN" EXIT

        echo "📊 СТАТИСТИКА ЗАГРУЗКИ IP-СПИСКОВ"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        TOTAL_BEFORE=0
        
        for URL in "${IP_SOURCES[@]}"; do
          SHORT_NAME=$(echo "$URL" | sed 's|.*/\([^/]*/[^/]*\)$|\1|' | cut -c1-40)
          
          # Считаем валидные CIDR после базовой чистки
          COUNT=$(curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" 2>/dev/null | awk '
          { gsub(/\r/, ""); sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "") }
          /^[[:space:]]*$/ { next }
          /^[[:space:]]*[#!\/]/ { next }
          {
            sub(/^ip-cidr,/i, ""); sub(/^ip-cidr6,/i, "")
            sub(/^no-resolve,/i, ""); sub(/^cidr:/i, "")
            sub(/^ipv4:/i, ""); sub(/^ipv6:/i, ""); gsub(/^[[:space:]]+|[[:space:]]+$/, "")
          }
          /^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$/ { c++ }
          /^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}\/[0-9]{1,3}$/ { c++ }
          /^::\/[0-9]+$/ { c++ }
          END { print c+0 }
          ' 2>/dev/null) || COUNT=0
          
          curl -fsSL --retry 3 --retry-delay 2 --max-time 30 "$URL" >> "$TEMP_RAW" 2>/dev/null || true
          
          printf "  %-40s %6s CIDR\n" "$SHORT_NAME..." "$COUNT"
          TOTAL_BEFORE=$((TOTAL_BEFORE + COUNT))
        done
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  ИТОГО скачано (до очистки):     $TOTAL_BEFORE CIDR"
        echo ""

        echo "🧹 Очистка и валидация IP/CIDR..."
        
        # === ПАРСЕР IP/CIDR (как в доменном скрипте — мягкая валидация) ===
        awk '
        BEGIN { IGNORECASE=1 }
        {
          gsub(/\r/, ""); gsub(/^\xEF\xBB\xBF/, "")
          sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, "")
        }
        /^[[:space:]]*$/ { next }
        /^[[:space:]]*[#!\/]/ { next }
        
        # Убираем префиксы правил
        {
          sub(/^ip-cidr,/i, ""); sub(/^ip-cidr6,/i, "")
          sub(/^no-resolve,/i, ""); sub(/^cidr:/i, "")
          sub(/^ipv4:/i, ""); sub(/^ipv6:/i, "")
          gsub(/^[[:space:]]+|[[:space:]]+$/, "")
        }
        
        # IPv4 CIDR: базовая валидация
        /^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$/ {
          n = split($0, p, "[./]")
          ok = 1
          for (i = 1; i <= 4; i++) if (p[i] > 255) ok = 0
          if (ok && p[5] <= 32) { print tolower($0); next }
        }
        
        # IPv6 CIDR: принимаем большинство форматов
        /^([0-9a-f:]+\/[0-9]{1,3})$/ {
          if ($0 ~ /:/ && $0 ~ /\//) { print tolower($0); next }
        }
        
        # Короткие IPv6
        /^::\/[0-9]+$/ { print tolower($0); next }
        ' "$TEMP_RAW" > "$TEMP_CLEAN"
        
        BEFORE_DEDUP=$(wc -l < "$TEMP_CLEAN")
        
        echo "🔍 Сортировка и удаление дубликатов..."
        LC_ALL=C sort -u "$TEMP_CLEAN" > files/ru-blocklist-ip.txt
        
        AFTER_DEDUP=$(wc -l < files/ru-blocklist-ip.txt)
        REMOVED=$((BEFORE_DEDUP - AFTER_DEDUP))
        SIZE=$(du -h files/ru-blocklist-ip.txt | cut -f1)
        PCT=$(awk "BEGIN {printf \"%.1f\", $REMOVED * 100 / ($BEFORE_DEDUP + 0.001)}")
        
        # Считаем IPv4 и IPv6 отдельно
        IPV4_COUNT=$(grep -cE '^([0-9]{1,3}\.){3}[0-9]{1,3}/' files/ru-blocklist-ip.txt || echo 0)
        IPV6_COUNT=$(grep -cE ':/' files/ru-blocklist-ip.txt || echo 0)
        
        echo ""
        echo "📊 ИТОГОВАЯ СТАТИСТИКА"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        printf "  CIDR после очистки:             %6s\n" "$BEFORE_DEDUP"
        printf "  Удалено дубликатов:             %6s (%s%%)\n" "$REMOVED" "$PCT"
        printf "  ✅ В итоговом файле:            %6s CIDR\n" "$AFTER_DEDUP"
        printf "    ├─ IPv4:                      %6s\n" "$IPV4_COUNT"
        printf "    └─ IPv6:                      %6s\n" "$IPV6_COUNT"
        printf "  Размер файла:                   %6s\n" "$SIZE"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo " Первые 5 записей из ru-blocklist-ip.txt:"
        head -5 files/ru-blocklist-ip.txt | sed 's/^/   ✓ /'

    - name: Commit and push result
      run: |
        git config user.name "RU IP List Bot"
        git config user.email "iplist-bot@github.com"
        
        git pull --rebase origin main 2>/dev/null || true
        
        if [ ! -f files/ru-blocklist-ip.txt ]; then
          echo "❌ Ошибка: файл ru-blocklist-ip.txt не найден!"
          exit 1
        fi

        git add files/ru-blocklist-ip.txt

        if ! git diff --staged --quiet; then
          git commit -m "🔄 Update ru-blocklist-ip.txt ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
          for i in 1 2 3; do
            git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
          done
          echo "📤 Файл успешно обновлён"
        else
          echo "⏭️ Список не изменился, пропуск коммита"
        fi
