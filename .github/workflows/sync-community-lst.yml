# .github/workflows/sync-community-lst.yml
name: Sync community.lst

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'  # Каждые 6 часов по MSK (00:00, 06:00, 12:00, 18:00)
  workflow_dispatch:            # Ручной запуск

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download & sync community.lst
        run: |
          SOURCE_URL="https://community.antifilter.download/list/community.lst"
          TARGET_FILE="files/community.lst"
          TEMP_FILE="files/community.lst.tmp"
          
          echo "📥 Скачиваю: $SOURCE_URL"
          curl -fsSL "$SOURCE_URL" -o "$TEMP_FILE" || {
            echo "❌ Ошибка загрузки"
            exit 1
          }
          
          # Нормализация: убираем пустые строки и служебные символы в начале
          grep -v '^#' "$TEMP_FILE" | grep -v '^$' | grep -v '^!' > "$TEMP_FILE.clean" || true
          
          if [ -f "$TARGET_FILE" ]; then
            # Сравниваем по содержимому (сортировка для точного сравнения)
            if diff -q <(sort "$TARGET_FILE" 2>/dev/null) <(sort "$TEMP_FILE.clean" 2>/dev/null) >/dev/null 2>&1; then
              echo "⏭️ Файл не изменился, коммит не требуется"
              rm -f "$TEMP_FILE" "$TEMP_FILE.clean"
              exit 0
            fi
          fi
          
          # Сохраняем обновлённый файл
          mv "$TEMP_FILE.clean" "$TARGET_FILE"
          rm -f "$TEMP_FILE"
          LINE_COUNT=$(wc -l < "$TARGET_FILE")
          echo "✅ Файл обновлён: $LINE_COUNT строк"

          # Коммит и пуш
          git config user.name "RU Blocklist Bot"
          git config user.email "blocklist-bot@github.com"
          
          git pull --rebase origin main 2>/dev/null || true
          git add "$TARGET_FILE"
          
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Update community.lst ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
            for i in 1 2 3; do
              git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
            done
            echo "📤 community.lst успешно обновлён"
          fi
