name: Convert ru-blocklist to .srs

on:
  push:
    paths:
      - 'files/ru-blocklist.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sing-box
        run: |
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | cut -d'"' -f4)
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION#v}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box*/sing-box /usr/local/bin/
          rm -rf sing-box*

      - name: Convert TXT to JSON and compile to .srs
        run: |
          if [ ! -f files/ru-blocklist.txt ]; then
            echo "❌ Ошибка: файл ru-blocklist.txt не найден!"
            exit 1
          fi
          
          python3 << 'EOF'
          import json
          with open('files/ru-blocklist.txt', 'r') as f:
              domains = [line.strip() for line in f if line.strip() and not line.startswith('#')]
          rule_set = {"version": 1, "rules": [{"domain": domains}]}
          with open('files/ru-blocklist.srs.json', 'w') as f:
              json.dump(rule_set, f, indent=2)
          print(f"✅ Создан JSON с {len(domains)} доменами")
          EOF
          
          sing-box rule-set compile --output files/ru-blocklist.srs files/ru-blocklist.srs.json
          echo "✅ Скомпилирован ru-blocklist.srs"

      - name: Commit and push result
        run: |
          git config user.name "RU Blocklist Bot"
          git config user.email "blocklist-bot@github.com"
          
          git pull --rebase origin main 2>/dev/null || true
          
          if [ ! -f files/ru-blocklist.srs ]; then
            echo "❌ Ошибка: файл ru-blocklist.srs не найден!"
            exit 1
          fi

          git add files/ru-blocklist.srs

          if ! git diff --staged --quiet; then
            git commit -m "🔄 Update ru-blocklist.srs ($(TZ='Europe/Moscow' date +'%Y-%m-%d %H:%M MSK'))"
            for i in 1 2 3; do
              git push && break || { sleep $((RANDOM % 5 + 1)); git pull --rebase origin main; }
            done
            echo "📤 Файл успешно обновлён"
          else
            echo "⏭️ Список не изменился, пропуск коммита"
          fi
